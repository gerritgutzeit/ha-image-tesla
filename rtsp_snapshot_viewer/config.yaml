name: "RTSP Snapshot Viewer"
version: "1.1.5"
slug: rtsp_snapshot_viewer
url: https://github.com/gerritgutzeit/ha-image-tesla
description: >-
  Fullscreen live JPEG snapshots from any RTSP camera inside Home Assistant (Ingress).
  Uses ffmpeg with TCP transport for reliable streams (e.g. Tapo C200). The browser loads
  a minimal page and reloads only the image on your configured interval—no HLS, WebRTC,
  or in-browser video codecs. Set rtsp_url and interval below; credentials stay in HA.
panel_title: RTSP Snapshot
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
ingress: true
ingress_port: 8099
ports:
  8099/tcp: null
panel_icon: mdi:camera
init: false
options:
  rtsp_url: "rtsp://user:password@192.168.1.100:554/stream1"
  interval: 10
schema:
  rtsp_url: str
  interval: int(1,86400)
