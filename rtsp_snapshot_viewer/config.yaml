name: "RTSP Snapshot Viewer"
version: "1.0.0"
slug: rtsp_snapshot_viewer
description: "Displays a live JPEG snapshot from an RTSP stream, refreshed every 10 seconds."
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
ingress: true
ingress_port: 8099
panel_icon: mdi:camera
init: false
options:
  rtsp_url: "rtsp://user:password@192.168.1.100:554/stream1"
  interval: 10
schema:
  rtsp_url: str
  interval: int
